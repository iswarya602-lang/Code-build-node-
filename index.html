<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Delivery App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        header {
            background: #ff6b35;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 20px;
            font-size: 18px;
        }

        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .hero p {
            color: #666;
            font-size: 18px;
        }

        .foods {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            width: 250px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        .card h3 {
            margin: 15px 0;
        }

        .btn {
            background: #ff6b35;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍔 Food Delivery Website</h1>
        <p>Welcome to AWS EKS Demo Application</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Menu</a>
        <a href="#">Offers</a>
        <a href="#">Contact</a>
    </nav>

    <section class="hero">
        <h1>Delicious Food Delivered Fast</h1>
        <p>Deploying a Food Website using GitHub, CodePipeline, CodeBuild, Docker, ECR and EKS</p>
    </section>

    <section class="foods">

        <div class="card">
            <img src="https://via.placeholder.com/250x150?text=Pizza" alt="Pizza">
            <h3>Pizza</h3>
            <p>₹299</p>
            <button class="btn">Order Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x150?text=Burger" alt="Burger">
            <h3>Burger</h3>
            <p>₹199</p>
            <button class="btn">Order Now</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250x150?text=Biryani" alt="Biryani">
            <h3>Biryani</h3>
            <p>₹249</p>
            <button class="btn">Order Now</button>
        </div>

    </section>

    <footer>
        <p>© 2026 Food Delivery App | Deployed on Amazon EKS</p>
    </footer>

</body>
</html>
